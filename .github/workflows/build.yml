name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Khoi tao dự án mẫu
        run: |
          mkdir -p app/src/main/java/com/example/app
          mkdir -p app/src/main/res/layout
          
          cat <<EOF > settings.gradle
          rootProject.name='AudioAI'
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.app"
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1' 
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="AudioAI Clean">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/java/com/example/app/MainActivity.java
          package com.example.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;
          import android.view.Gravity;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  TextView t = new TextView(this);
                  t.setText("TU TIÊN THÀNH CÔNG!\nAPK ĐÃ XUẤT THẾ!");
                  t.setTextSize(25);
                  t.setGravity(Gravity.CENTER);
                  setContentView(t);
              }
          }
          EOF

      - name: Cài đặt và tạo Gradle Wrapper
        run: |
          sudo apt install gradle -y
          gradle wrapper --gradle-version 8.2.2

      - name: Build APK (Dùng Wrapper)
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
